name: bupa-ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger from GitHub UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true  # Cancel previous runs if new push happens

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Fail if takes more than 10 min
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'  # Cache pip dependencies

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run unit tests
        run: |
          pytest -q tests/unit -m unit --tb=short

  integration_local_sample:
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 15  # Fail if takes more than 15 min
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'  # Cache pip dependencies

      - name: Install Spark + Delta + pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyspark==3.5.7 delta-spark==3.1.0

      - name: Run integration tests against gold_sample
        env:
          RUN_LOCAL_SPARK: "1"
          LOCAL_GOLD_BASE: "data/gold_sample"
        run: |
          pytest -q tests/integration -m integration --tb=short
